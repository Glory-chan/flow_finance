name: flow_finance
description: Application de gestion financiere personnelle FlowFinance.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/